# configs/kv_quant.yaml
# Configuração do runner de quantização de KV cache

model: Qwen/Qwen2.5-7B-Instruct
dtype: fp16
device: cuda
max_new_tokens: 256
trust_remote_code: false

kv_quantization:
  enabled: true
  method: turboquant    # uniform | kivi | turboquant
  bits: 4               # 2 | 4 | 8
  group_size: 128       # aumentado de 64 → melhor estimativa do codebook Lloyd-Max
  outlier_channels: 8   # reduzido de 32 → detecção pós-rotação é mais precisa
  rotation_seed: 42     # semente para rotação ortogonal (turboquant)
