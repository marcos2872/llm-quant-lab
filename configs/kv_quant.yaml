# configs/kv_quant.yaml
# Configuração do runner de quantização de KV cache

model: Qwen/Qwen2.5-7B-Instruct
dtype: fp16
device: cuda
max_new_tokens: 256
trust_remote_code: false

kv_quantization:
  enabled: true
  method: turboquant    # uniform | kivi | turboquant
  bits: 2               # bits para canais normais (paper: 2 → 2.5-bit efetivo)
  outlier_bits: 3       # bits para canais outlier (paper: 3 → 2.5-bit efetivo)
  outlier_channels: 32  # canais de alta precisão (paper: 32/128 = 25%)
  rotation_seed: 42     # semente para rotação ortogonal Π
